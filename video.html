<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Page</title>

    <style>
        body {
            background-color: lightgray;
            padding: 30px;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        .section {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            border: 2px solid red;
        }
    </style>
</head>
<body>

<h1>YouTube Video Example</h1>

<div class="section">
    <iframe
        src="https://www.youtube.com/embed/8Vuwv-aEEXQ"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
