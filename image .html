<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Page</title>

    <style>
        body {
            background-color: lightgray;
            padding: 30px;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        .section {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid green;
        }
    </style>
</head>
<body>

<h1>Image Example</h1>

<div class="section">
    <h3>Image Tag</h3>
    <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" alt="Sample Image">
</div>

</body>
</html>
